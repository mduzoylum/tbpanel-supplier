name: Deploy Supplier
on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run generate

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Upload dist
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            .output/public/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/tbpanel/supplier/dist/

      - name: Reload
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'SSH'
            cd /opt/tbpanel && docker compose up -d supplier_web
          SSH
